{% extends 'base.html' %}
{% block title %}Médicos{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="h4 mb-0">Listado de Médicos</h2>
  <a href="{{ url_for('appointments') }}" class="btn btn-outline-primary">Ver mis citas</a>
</div>
<div class="row g-3">
  {% for doctor in doctors %}
    <div class="col-md-4">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">{{ doctor.full_name }}</h5>
          <p class="card-text text-muted">{{ doctor.specialty }}</p>
          <a href="{{ url_for('available_slots', doctor_id=doctor.id) }}" class="btn btn-primary">Ver horarios</a>
        </div>
      </div>
    </div>
  {% endfor %}
</div>
{% endblock %}
